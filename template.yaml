AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  CSV Bulk SMS Sender — upload a CSV to S3, validate and dispatch to SQS,
  then send SMS via AWS End User Messaging with concurrency-controlled workers.

Parameters:
  StackPrefix:
    Type: String
    Description: Prefix for resource names — use different values for multi-stack deploys
    Default: BulkSmsSender
  BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique)
    Default: ''
  OriginationIdentity:
    Type: String
    Description: Sending phone number or ARN (e.g. +15551234567)
    Default: ''
  MessageType:
    Type: String
    Description: TRANSACTIONAL or PROMOTIONAL
    Default: TRANSACTIONAL
    AllowedValues:
      - TRANSACTIONAL
      - PROMOTIONAL
  ConfigurationSet:
    Type: String
    Description: Configuration set name for event tracking (optional)
    Default: ''
  SenderConcurrency:
    Type: Number
    Description: Max concurrent Sender Lambda invocations (controls SMS throughput)
    Default: 20
    MinValue: 1
    MaxValue: 100
  MaxRetries:
    Type: String
    Description: Max retry attempts for throttled sends within a single invocation
    Default: '2'
  DlqAlarmEmail:
    Type: String
    Description: Email address for DLQ alarm notifications (optional)
    Default: ''

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]
  HasDlqAlarmEmail: !Not [!Equals [!Ref DlqAlarmEmail, '']]

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    MemorySize: 256

Resources:

  # -----------------------------------------------------------------------
  # KMS Key for encrypting SQS, SNS, DynamoDB, and S3
  # -----------------------------------------------------------------------

  StackKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub '${StackPrefix} encryption key for SQS, SNS, DynamoDB'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccountFullAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
            Resource: '*'
          - Sid: AllowSQSUsage
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
            Resource: '*'
          - Sid: AllowCloudWatchAlarms
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
            Resource: '*'

  StackKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${StackPrefix}-key'
      TargetKeyId: !Ref StackKmsKey

  # -----------------------------------------------------------------------
  # SQS Queue + Dead Letter Queue
  # -----------------------------------------------------------------------

  SmsSendQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${StackPrefix}-send-queue'
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400  # 1 day
      KmsMasterKeyId: !Ref StackKmsKey
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SmsSendDLQ.Arn
        maxReceiveCount: 3

  SmsSendDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${StackPrefix}-send-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      KmsMasterKeyId: !Ref StackKmsKey

  # -----------------------------------------------------------------------
  # DynamoDB Template Table (optional — only needed for template_id usage)
  # -----------------------------------------------------------------------

  SmsTemplateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${StackPrefix}-templates'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: template_id
          AttributeType: S
      KeySchema:
        - AttributeName: template_id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref StackKmsKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # -----------------------------------------------------------------------
  # Dispatcher Lambda — validates CSV, resolves templates, writes to SQS
  # -----------------------------------------------------------------------

  DispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${StackPrefix}-dispatcher'
      Handler: app.handler
      CodeUri: lambda/dispatcher/
      Timeout: 300
      Environment:
        Variables:
          ORIGINATION_IDENTITY: !Ref OriginationIdentity
          MESSAGE_TYPE: !Ref MessageType
          CONFIGURATION_SET: !Ref ConfigurationSet
          SQS_QUEUE_URL: !Ref SmsSendQueue
          TEMPLATE_TABLE_NAME: !Ref SmsTemplateTable

  DispatcherFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DispatcherFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  DispatcherPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${StackPrefix}-dispatcher-policy'
      Roles:
        - !Ref DispatcherFunctionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource:
              - !Sub '${BulkSmsBucket.Arn}/incoming/*'
              - !Sub '${BulkSmsBucket.Arn}/scheduled/*'
          - Effect: Allow
            Action: s3:PutObject
            Resource:
              - !Sub '${BulkSmsBucket.Arn}/processed/*'
              - !Sub '${BulkSmsBucket.Arn}/logs/*'
          - Effect: Allow
            Action: s3:DeleteObject
            Resource:
              - !Sub '${BulkSmsBucket.Arn}/incoming/*'
              - !Sub '${BulkSmsBucket.Arn}/scheduled/*'
          - Effect: Allow
            Action: sqs:SendMessage
            Resource: !GetAtt SmsSendQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:GetItem
            Resource: !GetAtt SmsTemplateTable.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt StackKmsKey.Arn

  # -----------------------------------------------------------------------
  # Sender Lambda — consumes from SQS, sends SMS
  # -----------------------------------------------------------------------

  SenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${StackPrefix}-sender'
      Handler: app.handler
      CodeUri: lambda/sms_sender/
      Timeout: 30
      MemorySize: 128
      ReservedConcurrentExecutions: !Ref SenderConcurrency
      Environment:
        Variables:
          MAX_RETRIES: !Ref MaxRetries
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt SmsSendQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  SenderPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${StackPrefix}-sender-policy'
      Roles:
        - !Ref SenderFunctionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sms-voice:SendTextMessage
            Resource: '*'
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt StackKmsKey.Arn

  # -----------------------------------------------------------------------
  # S3 Access Logging Bucket
  # -----------------------------------------------------------------------

  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90

  AccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AccessLogsBucket.Arn}/*'
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt BulkSmsBucket.Arn
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AccessLogsBucket.Arn
              - !Sub '${AccessLogsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # -----------------------------------------------------------------------
  # S3 Bucket
  # -----------------------------------------------------------------------

  BulkSmsBucket:
    Type: AWS::S3::Bucket
    DependsOn: DispatcherFunctionPermission
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: bulk-sms-bucket/
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt DispatcherFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: incoming/
                  - Name: suffix
                    Value: .csv

  BulkSmsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BulkSmsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt BulkSmsBucket.Arn
              - !Sub '${BulkSmsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # -----------------------------------------------------------------------
  # DLQ Alarm + SNS Topic
  # -----------------------------------------------------------------------

  DlqAlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasDlqAlarmEmail
    Properties:
      TopicName: !Sub '${StackPrefix}-dlq-alarm'
      KmsMasterKeyId: !Ref StackKmsKey
      Subscription:
        - Protocol: email
          Endpoint: !Ref DlqAlarmEmail

  DlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasDlqAlarmEmail
    Properties:
      AlarmName: !Sub '${StackPrefix}-dlq-messages'
      AlarmDescription: Messages are landing in the SMS send dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SmsSendDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref DlqAlarmTopic

  # -----------------------------------------------------------------------
  # EventBridge Scheduler Role
  # -----------------------------------------------------------------------

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${StackPrefix}-scheduler-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDispatcherLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt DispatcherFunction.Arn

Outputs:
  BucketName:
    Description: S3 bucket for CSV uploads
    Value: !Ref BulkSmsBucket
  AccessLogsBucketName:
    Description: S3 bucket for access logs
    Value: !Ref AccessLogsBucket
  KmsKeyArn:
    Description: KMS key ARN used for encryption
    Value: !GetAtt StackKmsKey.Arn
  DispatcherFunctionArn:
    Description: Dispatcher Lambda function ARN
    Value: !GetAtt DispatcherFunction.Arn
  SenderFunctionArn:
    Description: Sender Lambda function ARN
    Value: !GetAtt SenderFunction.Arn
  SendQueueUrl:
    Description: SQS queue URL for send jobs
    Value: !Ref SmsSendQueue
  DlqUrl:
    Description: Dead-letter queue URL for failed sends
    Value: !Ref SmsSendDLQ
  TemplateTableName:
    Description: DynamoDB table for SMS templates
    Value: !Ref SmsTemplateTable
  SchedulerRoleArn:
    Description: IAM role ARN for EventBridge Scheduler
    Value: !GetAtt SchedulerRole.Arn
  UploadCommand:
    Description: Example upload command
    Value: !Sub 'aws s3 cp your-file.csv s3://${BulkSmsBucket}/incoming/your-file.csv'
  ScheduleCommand:
    Description: Example EventBridge Scheduler command
    Value: !Sub >-
      aws scheduler create-schedule --name my-campaign
      --schedule-expression "at(2026-04-20T10:00:00)"
      --schedule-expression-timezone "America/Los_Angeles"
      --flexible-time-window Mode=OFF
      --action-after-completion DELETE
      --target '{"Arn":"${DispatcherFunction.Arn}","RoleArn":"${SchedulerRole.Arn}","Input":"{\"bucket\":\"${BulkSmsBucket}\",\"key\":\"scheduled/my-file.csv\",\"campaign_name\":\"my-campaign\"}"}'
      --region us-west-2
